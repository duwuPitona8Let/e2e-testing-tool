{% extends "base.html" %}
{% block title %}Товары — Demo Shop{% endblock %}
{% block content %}
<h1>Каталог товаров</h1>
{% for item in items %}
<div class="card" style="display:flex;align-items:center;justify-content:space-between">
  <div>
    <h2>{{ item.name }}</h2>
    <p style="color:#888;margin-top:4px">Артикул: {{ item.id }}</p>
  </div>
  <div style="display:flex;align-items:center;gap:12px">
    <span style="font-size:1.3rem;font-weight:700;color:#2c3e50">{{ item.price }} ₽</span>
    <a href="/items/{{ item.id }}" class="btn btn-primary btn-sm">Подробнее</a>
    <form method="POST" action="/cart/add/{{ item.id }}" style="margin:0">
      <button type="submit" class="btn btn-success btn-sm">В корзину</button>
    </form>
  </div>
</div>
{% endfor %}
{% endblock %}
