<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Demo App{% endblock %}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
           background: #f5f5f5; color: #333; }
    nav { background: #2c3e50; padding: 14px 32px; display: flex;
          align-items: center; gap: 24px; }
    nav a { color: #ecf0f1; text-decoration: none; font-size: .95rem; }
    nav a:hover { color: #3498db; }
    nav .brand { font-weight: 700; font-size: 1.1rem; margin-right: auto; }
    .cart-badge { background: #e74c3c; color: white; border-radius: 10px;
                  padding: 1px 7px; font-size: .75rem; margin-left: 4px; }
    .container { max-width: 900px; margin: 40px auto; padding: 0 24px; }
    h1 { margin-bottom: 24px; font-size: 1.8rem; }
    h2 { margin-bottom: 16px; }
    .btn { display: inline-block; padding: 10px 20px; border-radius: 6px;
           text-decoration: none; font-size: .9rem; cursor: pointer; border: none; }
    .btn-primary { background: #3498db; color: white; }
    .btn-primary:hover { background: #2980b9; }
    .btn-danger  { background: #e74c3c; color: white; }
    .btn-danger:hover  { background: #c0392b; }
    .btn-success { background: #27ae60; color: white; }
    .btn-success:hover { background: #219a52; }
    .btn-sm { padding: 6px 14px; font-size: .82rem; }
    .card { background: white; border-radius: 8px; padding: 24px;
            box-shadow: 0 1px 4px rgba(0,0,0,.08); margin-bottom: 16px; }
    .alert { padding: 12px 16px; border-radius: 6px; margin-bottom: 16px; }
    .alert-error { background: #fde8e8; color: #c0392b; border: 1px solid #f5c6c6; }
  </style>
</head>
<body>
<nav>
  <a class="brand" href="/">Demo Shop</a>
  <a href="/">Главная</a>
  <a href="/items">Товары</a>
  <a href="/cart">Корзина{% if cart_count %}<span class="cart-badge">{{ cart_count }}</span>{% endif %}</a>
  {% if session.user %}
    <a href="/dashboard">Кабинет</a>
    <a href="/logout">Выйти ({{ session.user }})</a>
  {% else %}
    <a href="/login">Войти</a>
  {% endif %}
</nav>
<div class="container">
  {% block content %}{% endblock %}
</div>
</body>
</html>
